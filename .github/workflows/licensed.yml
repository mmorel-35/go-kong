name: Licensed
on:
  push:
    branches:
      - '**'
    tags-ignore:    
      - '**'
jobs:
  licenses:
    runs-on: ubuntu-latest
    steps:
    # if using actions/checkout at major version 2 or greater,
    # please set fetch-depth to a high number, or to 0.
    # running this action can require access to more than just the latest commit on a branch
    - uses: actions/checkout@v2
      with:
        fetch-depth: 0
    - name: Setup go
      uses: actions/setup-go@v2
      with:
        go-version: '^1.16'
    - uses: jonabc/setup-licensed@v1
      with:
        version: 3.x
    - run: go mod tidy # install your projects dependencies in local environment
    - id: licensed
      uses: jonabc/licensed-ci@v1
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
